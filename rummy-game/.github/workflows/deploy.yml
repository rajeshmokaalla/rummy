name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # Default branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history so that GH Pages can pull from all branches history

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Use a recent Node.js version
          cache: 'npm' # Cache npm dependencies

      - name: Install Dependencies
        run: npm install # Assuming you might use npm for build tooling or just for dependency management

      - name: Build Project
        run: |
          # This is a placeholder for your build command.
          # If you use a static site generator (like Vite, React, Vue, etc.), you'd run its build command here.
          # For a simple HTML/CSS/JS project, a build step might not be strictly necessary,
          # but it's good practice to include if you were using a bundler.
          # Example with Vite: npm run build
          # For this simple project, we'll just consider the files as ready.
          echo "No build step required for this simple static site."

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./rummy-game/public # Directory containing the built files
          # Optional: if you want to deploy to a specific branch other than gh-pages
          # publish_branch: gh-pages
          # Optional: commit message
          # commit_message: Deploying rummy-scorekeeper site
